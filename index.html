<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta
name="viewport"
content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">

<title>Ultimate Mobile Racing</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
touch-action:none;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
font-family:Arial,Helvetica,sans-serif;
background:#000;
}

canvas{
display:block;
position:absolute;
left:0;
top:0;
}

#menu{
position:absolute;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:
linear-gradient(
180deg,
#111,
#222,
#111
);
z-index:20;
}

#menu h1{
color:white;
font-size:48px;
margin-bottom:20px;
}

#menu p{
color:#ccc;
margin-bottom:20px;
}

.menuBtn{
padding:14px 30px;
border:none;
border-radius:12px;
font-size:20px;
cursor:pointer;
margin:8px;
}

#garage{
display:flex;
gap:15px;
margin-bottom:20px;
}

.carCard{
width:80px;
height:120px;
border-radius:12px;
border:3px solid #666;
cursor:pointer;
}

.carCard.selected{
border-color:#00ff99;
transform:scale(1.05);
}

.red{
background:#ff4444;
}

.blue{
background:#3399ff;
}

.green{
background:#00cc66;
}

#hud{
position:absolute;
top:10px;
left:10px;
right:10px;
display:none;
justify-content:space-between;
align-items:center;
z-index:10;
pointer-events:none;
}

.panel{
background:rgba(0,0,0,.5);
color:white;
padding:10px;
border-radius:10px;
backdrop-filter:blur(5px);
}

#controls{
position:absolute;
bottom:20px;
right:20px;
display:none;
z-index:10;
}

.controlBtn{
width:70px;
height:70px;
border:none;
border-radius:50%;
font-size:18px;
font-weight:bold;
margin:5px;
}

#nitroBtn{
background:#00bfff;
color:white;
}

#pauseBtn{
background:#ffaa00;
color:black;
}

#gameOver{
position:absolute;
inset:0;
background:rgba(0,0,0,.9);
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:30;
color:white;
}

#gameOver h1{
font-size:50px;
margin-bottom:20px;
}

#gameOver button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:10px;
cursor:pointer;
margin-top:15px;
}

.powerIndicator{
margin-top:5px;
font-size:14px;
}

</style>
</head>

<body>

<div id="menu">

<h1>🏎 Ultimate Racing</h1>

<p>Select Vehicle</p>

<div id="garage">

<div class="carCard red selected"
data-color="#ff4444"></div>

<div class="carCard blue"
data-color="#3399ff"></div>

<div class="carCard green"
data-color="#00cc66"></div>

</div>

<button
class="menuBtn"
id="startBtn">
START GAME
</button>

</div>

<div id="hud">

<div class="panel">

<div>
Score:
<span id="score">0</span>
</div>

<div>
Coins:
<span id="coins">0</span>
</div>

<div>
Best:
<span id="best">0</span>
</div>

</div>

<div class="panel">

<div>
Speed:
<span id="speedText">0</span>
</div>

<div class="powerIndicator">
Shield:
<span id="shieldStatus">OFF</span>
</div>

<div class="powerIndicator">
Magnet:
<span id="magnetStatus">OFF</span>
</div>

</div>

</div>

<div id="controls">

<button
class="controlBtn"
id="nitroBtn">
N
</button>

<button
class="controlBtn"
id="pauseBtn">
II
</button>

</div>

<div id="gameOver">

<h1>GAME OVER</h1>

<h2 id="finalScore">
0
</h2>

<button id="restartBtn">
PLAY AGAIN
</button>

</div>

<canvas id="game"></canvas>

<script>

const canvas =
document.getElementById("game");

const ctx =
canvas.getContext("2d");

function resize(){

canvas.width =
window.innerWidth;

canvas.height =
window.innerHeight;

roadWidth =
canvas.width*0.8;

roadLeft =
(canvas.width-roadWidth)/2;

roadRight =
roadLeft+roadWidth;

laneWidth =
roadWidth/4;
}

let roadWidth=0;
let roadLeft=0;
let roadRight=0;
let laneWidth=0;

resize();

window.addEventListener(
"resize",
resize
);

const scoreEl =
document.getElementById("score");

const coinsEl =
document.getElementById("coins");

const bestEl =
document.getElementById("best");

const speedEl =
document.getElementById("speedText");

const shieldEl =
document.getElementById("shieldStatus");

const magnetEl =
document.getElementById("magnetStatus");

const menu =
document.getElementById("menu");

const hud =
document.getElementById("hud");

const controls =
document.getElementById("controls");

const gameOverScreen =
document.getElementById("gameOver");

const finalScore =
document.getElementById("finalScore");

let selectedColor =
"#ff4444";

document
.querySelectorAll(".carCard")
.forEach(card=>{

card.onclick=()=>{

document
.querySelectorAll(".carCard")
.forEach(c=>
c.classList.remove(
"selected"
));

card.classList.add(
"selected"
);

selectedColor =
card.dataset.color;

};

});

let gameRunning=false;
let paused=false;

let score=0;
let coins=0;

let best =
localStorage.getItem(
"racingBest"
)||0;

bestEl.textContent=best;

let dayTimer=0;

const player={

x:0,
y:0,

w:50,
h:90,

color:selectedColor,

speed:8,

targetX:0,

shield:false,
shieldTimer:0,

magnet:false,
magnetTimer:0,

nitro:false,
nitroTimer:0

};

player.y=
canvas.height-160;

const traffic = [];
const coinsArr = [];
const powerUps = [];
const particles = [];

let dragActive = false;

const roadLines = [];

for(let i=0;i<25;i++){

    roadLines.push({
        y:i*80
    });

}

function laneCenter(lane){

    return roadLeft +
           laneWidth*lane +
           laneWidth/2;

}

function spawnTraffic(){

    const lane =
    Math.floor(Math.random()*4);

    traffic.push({

        lane,

        x:laneCenter(lane)-25,

        y:-120,

        w:50,
        h:90,

        speed:
        5+
        Math.random()*5,

        color:
        `hsl(${Math.random()*360},
        80%,60%)`

    });

}

function spawnCoin(){

    const lane =
    Math.floor(Math.random()*4);

    coinsArr.push({

        lane,

        x:laneCenter(lane),

        y:-40,

        r:12,

        value:1

    });

}

function spawnPowerUp(){

    const lane =
    Math.floor(Math.random()*4);

    const type =
    Math.random()>0.5
    ? "shield"
    : "magnet";

    powerUps.push({

        lane,

        x:laneCenter(lane),

        y:-50,

        type,

        size:20

    });

}

setInterval(()=>{

    if(!gameRunning ||
       paused) return;

    spawnTraffic();

},800);

setInterval(()=>{

    if(!gameRunning ||
       paused) return;

    spawnCoin();

},1200);

setInterval(()=>{

    if(!gameRunning ||
       paused) return;

    if(Math.random()>.55){

        spawnPowerUp();

    }

},6000);

function createExplosion(x,y,color){

    for(let i=0;i<30;i++){

        particles.push({

            x,
            y,

            vx:
            (Math.random()-0.5)*8,

            vy:
            (Math.random()-0.5)*8,

            life:40,

            color

        });

    }

}

function updateParticles(){

    for(let i=
        particles.length-1;
        i>=0;
        i--){

        const p =
        particles[i];

        p.x += p.vx;
        p.y += p.vy;

        p.life--;

        ctx.globalAlpha =
        p.life/40;

        ctx.fillStyle =
        p.color;

        ctx.fillRect(
            p.x,
            p.y,
            4,
            4
        );

        ctx.globalAlpha=1;

        if(p.life<=0){

            particles.splice(i,1);

        }

    }

}

function drawRoad(){

    dayTimer += 0.002;

    const sky =
    Math.sin(dayTimer);

    let bg =
    sky>0
    ? "#6bb7ff"
    : "#071126";

    ctx.fillStyle=bg;
    ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    ctx.fillStyle="#444";

    ctx.fillRect(
        roadLeft,
        0,
        roadWidth,
        canvas.height
    );

    ctx.fillStyle="#2a2a2a";

    ctx.fillRect(
        roadLeft-10,
        0,
        10,
        canvas.height
    );

    ctx.fillRect(
        roadRight,
        0,
        10,
        canvas.height
    );

    ctx.strokeStyle="white";
    ctx.lineWidth=4;

    roadLines.forEach(line=>{

        line.y += player.speed;

        if(line.y>
            canvas.height+50){

            line.y=-80;

        }

        for(let lane=1;
            lane<4;
            lane++){

            const x=
            roadLeft+
            laneWidth*lane;

            ctx.beginPath();

            ctx.moveTo(
                x,
                line.y
            );

            ctx.lineTo(
                x,
                line.y+40
            );

            ctx.stroke();

        }

    });

}

function drawPlayer(){

    player.color =
    selectedColor;

    player.x +=
    (player.targetX-player.x)
    *0.25;

    player.x =
    Math.max(
        roadLeft+5,
        Math.min(
            roadRight-
            player.w-5,
            player.x
        )
    );

    ctx.fillStyle=
    player.color;

    ctx.fillRect(
        player.x,
        player.y,
        player.w,
        player.h
    );

    ctx.fillStyle="#111";

    ctx.fillRect(
        player.x+6,
        player.y+12,
        12,
        18
    );

    ctx.fillRect(
        player.x+32,
        player.y+12,
        12,
        18
    );

    if(player.shield){

        ctx.beginPath();

        ctx.arc(
            player.x+
            player.w/2,

            player.y+
            player.h/2,

            45,
            0,
            Math.PI*2
        );

        ctx.strokeStyle=
        "#00ffff";

        ctx.lineWidth=4;

        ctx.stroke();

    }

}

function updatePowerTimers(){

    if(player.shield){

        player.shieldTimer--;

        if(player.shieldTimer<=0){

            player.shield=false;

        }

    }

    if(player.magnet){

        player.magnetTimer--;

        if(player.magnetTimer<=0){

            player.magnet=false;

        }

    }

    shieldEl.textContent=
    player.shield
    ? "ON"
    : "OFF";

    magnetEl.textContent=
    player.magnet
    ? "ON"
    : "OFF";

}

function rectsCollide(a,b){

    return (
        a.x < b.x + b.w &&
        a.x + a.w > b.x &&
        a.y < b.y + b.h &&
        a.y + a.h > b.y
    );

}

function updateTraffic(){

    for(let i=traffic.length-1;i>=0;i--){

        const car = traffic[i];

        car.y += car.speed + (player.nitro ? 6 : 0);

        car.x =
        laneCenter(car.lane) -
        car.w/2;

        ctx.fillStyle =
        car.color;

        ctx.fillRect(
            car.x,
            car.y,
            car.w,
            car.h
        );

        ctx.fillStyle="#111";

        ctx.fillRect(
            car.x+6,
            car.y+10,
            12,
            18
        );

        ctx.fillRect(
            car.x+32,
            car.y+10,
            12,
            18
        );

        if(
            rectsCollide(
                player,
                car
            )
        ){

            if(player.shield){

                player.shield=false;

                createExplosion(
                    car.x+25,
                    car.y+40,
                    "#00ffff"
                );

                traffic.splice(i,1);

                continue;

            }

            crashGame();

            return;

        }

        if(car.y >
            canvas.height+150){

            traffic.splice(i,1);

            score += 10;

        }

    }

}

function updateCoins(){

    for(let i=coinsArr.length-1;i>=0;i--){

        const coin =
        coinsArr[i];

        coin.y +=
        player.speed;

        if(player.magnet){

            const dx =
            player.x +
            player.w/2 -
            coin.x;

            const dy =
            player.y -
            coin.y;

            const dist =
            Math.sqrt(
                dx*dx +
                dy*dy
            );

            if(dist < 220){

                coin.x += dx*0.12;
                coin.y += dy*0.12;

            }

        }

        ctx.beginPath();

        ctx.arc(
            coin.x,
            coin.y,
            coin.r,
            0,
            Math.PI*2
        );

        ctx.fillStyle=
        "#FFD700";

        ctx.fill();

        const hit =
        Math.abs(
            coin.x -
            (player.x+
            player.w/2)
        ) < 35 &&

        Math.abs(
            coin.y -
            (player.y+
            player.h/2)
        ) < 55;

        if(hit){

            coins += coin.value;

            score += 5;

            createExplosion(
                coin.x,
                coin.y,
                "#FFD700"
            );

            coinsArr.splice(i,1);

            continue;

        }

        if(
            coin.y >
            canvas.height+50
        ){

            coinsArr.splice(i,1);

        }

    }

}

function updatePowerUps(){

    for(let i=
        powerUps.length-1;
        i>=0;
        i--){

        const p =
        powerUps[i];

        p.y +=
        player.speed;

        ctx.beginPath();

        ctx.arc(
            p.x,
            p.y,
            p.size,
            0,
            Math.PI*2
        );

        ctx.fillStyle =
        p.type==="shield"
        ? "#00ffff"
        : "#ff00ff";

        ctx.fill();

        ctx.fillStyle=
        "#fff";

        ctx.font=
        "16px Arial";

        ctx.textAlign=
        "center";

        ctx.fillText(

            p.type==="shield"
            ? "S"
            : "M",

            p.x,
            p.y+5

        );

        const hit =
        Math.abs(
            p.x -
            (player.x+
            player.w/2)
        ) < 35 &&

        Math.abs(
            p.y -
            (player.y+
            player.h/2)
        ) < 55;

        if(hit){

            if(p.type==="shield"){

                player.shield=true;

                player.shieldTimer=
                600;

            }

            if(p.type==="magnet"){

                player.magnet=true;

                player.magnetTimer=
                600;

            }

            createExplosion(
                p.x,
                p.y,
                "#ffffff"
            );

            powerUps.splice(i,1);

            continue;

        }

        if(
            p.y >
            canvas.height+50
        ){

            powerUps.splice(i,1);

        }

    }

}

function activateNitro(){

    player.nitro=true;

    player.nitroTimer=240;

}

document
.getElementById(
"nitroBtn"
)
.addEventListener(
"click",
activateNitro
);

function updateNitro(){

    if(player.nitro){

        player.nitroTimer--;

        player.speed=14;

        if(
            player.nitroTimer<=0
        ){

            player.nitro=false;

            player.speed=8;

        }

    }

}

document
.getElementById(
"pauseBtn"
)
.addEventListener(
"click",
()=>{

    paused=!paused;

});

canvas.addEventListener(
"pointerdown",
e=>{

    dragActive=true;

    player.targetX=
    e.clientX -
    player.w/2;

});

canvas.addEventListener(
"pointermove",
e=>{

    if(!dragActive)
    return;

    player.targetX=
    e.clientX -
    player.w/2;

});

canvas.addEventListener(
"pointerup",
()=>{

    dragActive=false;

});

canvas.addEventListener(
"pointercancel",
()=>{

    dragActive=false;

});

function updateHUD(){

    scoreEl.textContent=
    Math.floor(score);

    coinsEl.textContent=
    coins;

    speedEl.textContent=
    Math.floor(
        player.speed
    );

}

function crashGame(){

    gameRunning = false;

    createExplosion(
        player.x + player.w/2,
        player.y + player.h/2,
        "#ff4444"
    );

    if(navigator.vibrate){

        navigator.vibrate(
            [200,100,200]
        );

    }

    if(score > best){

        best = Math.floor(score);

        localStorage.setItem(
            "racingBest",
            best
        );

    }

    bestEl.textContent = best;

    finalScore.innerHTML =
    `
    Score: ${Math.floor(score)}
    <br><br>
    Coins: ${coins}
    <br><br>
    Best: ${best}
    `;

    setTimeout(()=>{

        gameOverScreen.style.display =
        "flex";

    },500);

}

function resetGame(){

    score = 0;

    coins = 0;

    traffic.length = 0;

    coinsArr.length = 0;

    powerUps.length = 0;

    particles.length = 0;

    player.w = 50;

    player.h = 90;

    player.speed = 8;

    player.shield = false;

    player.magnet = false;

    player.nitro = false;

    player.shieldTimer = 0;

    player.magnetTimer = 0;

    player.nitroTimer = 0;

    player.x =
    laneCenter(1) -
    player.w/2;

    player.targetX =
    player.x;

    player.y =
    canvas.height - 160;

    gameOverScreen.style.display =
    "none";

    hud.style.display =
    "flex";

    controls.style.display =
    "block";

}

function startGame(){

    resetGame();

    menu.style.display =
    "none";

    gameRunning = true;

    paused = false;

}

document
.getElementById(
"startBtn"
)
.addEventListener(
"click",
startGame
);

document
.getElementById(
"restartBtn"
)
.addEventListener(
"click",
()=>{

    startGame();

});

let difficultyTimer = 0;

function increaseDifficulty(){

    difficultyTimer++;

    if(difficultyTimer % 300 === 0){

        player.speed += 0.2;

    }

}

function drawNitroEffect(){

    if(!player.nitro)
    return;

    ctx.fillStyle =
    "rgba(0,191,255,.7)";

    for(let i=0;i<5;i++){

        ctx.fillRect(

            player.x +
            player.w/2 - 4,

            player.y +
            player.h +
            i*12,

            8,

            10

        );

    }

}

function render(){

    if(gameRunning){

        if(!paused){

            drawRoad();

            updateTraffic();

            updateCoins();

            updatePowerUps();

            updateNitro();

            updatePowerTimers();

            increaseDifficulty();

            drawPlayer();

            drawNitroEffect();

            updateParticles();

            updateHUD();

            score += 0.1;

        }else{

            ctx.fillStyle =
            "rgba(0,0,0,.5)";

            ctx.fillRect(
                0,
                0,
                canvas.width,
                canvas.height
            );

            ctx.fillStyle =
            "#fff";

            ctx.font =
            "40px Arial";

            ctx.textAlign =
            "center";

            ctx.fillText(
                "PAUSED",
                canvas.width/2,
                canvas.height/2
            );

        }

    }

    requestAnimationFrame(
        render
    );

}

player.x =
laneCenter(1) -
player.w/2;

player.targetX =
player.x;

hud.style.display =
"none";

controls.style.display =
"none";

render();

</script>

</body>
</html>
